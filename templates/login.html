{% extends 'base.html' %}
{% block title %}Login — Social Text{% endblock %}
{% block content %}
<div style="max-width:420px; margin: 3rem auto;">
    <div class="card">
        <h1 style="font-size:1.4rem; font-weight:700; margin-bottom:.25rem;">Welcome back</h1>
        <p class="muted" style="margin-bottom:1.25rem;">Log in to your account.</p>

        <form method="POST">
            <div class="form-group">
                <label for="login">Username or email</label>
                <input id="login" type="text" name="login" required autocomplete="username" placeholder="Username or email address">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required autocomplete="current-password" placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary w-full">Log in</button>
        </form>

        <p class="muted mt-2 center">No account yet? <a href="{{ url_for('register') }}" style="color:var(--primary);">Register</a></p>
    </div>
</div>
{% endblock %}
