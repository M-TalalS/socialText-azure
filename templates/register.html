{% extends 'base.html' %}
{% block title %}Register — Social Text{% endblock %}
{% block content %}
<div style="max-width:420px; margin: 3rem auto;">
    <div class="card">
        <h1 style="font-size:1.4rem; font-weight:700; margin-bottom:.25rem;">Create an account</h1>
        <p class="muted" style="margin-bottom:1.25rem;">Join Social Text today.</p>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required autocomplete="username" placeholder="e.g. jsmith">
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" name="email" required autocomplete="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required autocomplete="new-password" placeholder="Choose a strong password">
            </div>
            <button type="submit" class="btn btn-primary w-full">Register</button>
        </form>

        <p class="muted mt-2 center">Already have an account? <a href="{{ url_for('login') }}" style="color:var(--primary);">Log in</a></p>
    </div>
</div>
{% endblock %}
